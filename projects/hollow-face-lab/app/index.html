  <body>
    <div class="app-shell">
      <header class="site-header">
        <div class="site-shell site-header-row">
          <a class="site-name" href="/" aria-label="Mesmer Prism home">
            <img
              class="site-mark"
              src="/assets/brand/mesmer-prism-logo.png"
              alt=""
              width="1200"
              height="508"
              decoding="async"
            />
            <span>Mesmer Prism</span>
          </a>
          <nav class="site-nav" aria-label="Hollow Face Lab links">
            <a href="/projects/hollow-face-lab.html">Project page</a>
            <a href="/projects/hollow-face-lab.html#implementation">Implementation</a>
            <a href="/projects/hollow-face-lab.html#references">References</a>
          </nav>
        </div>
      </header>
      <header class="app-header">
        <h1>Hollow Face Lab</h1>
        <div class="runtime-strip" aria-live="polite">
          <span id="runtime-mode">Flat Web</span>
          <span id="xr-status">Checking WebXR</span>
          <span id="frame-status">0 fps</span>
        </div>
      </header>

      <main class="workspace">
        <section class="stage-panel" aria-label="Hollow face render stage">
          <canvas id="scene-canvas"></canvas>
          <div class="stage-toolbar" aria-label="Stimulus view controls">
            <button
              id="fullscreen-stimulus"
              type="button"
              data-tooltip="Shows only the stimulus canvas in browser fullscreen. When stereoscope mode is on, each fullscreen half shows the same render."
            >
              Fullscreen
            </button>
            <button
              id="stereoscope-mode"
              type="button"
              aria-pressed="false"
              data-tooltip="Duplicates the same stimulus side by side in the canvas for magic-eye-style free viewing. This is a duplicated view, not a calibrated stereo-depth disparity."
            >
              Stereo Pair
            </button>
          </div>
          <div class="stage-overlay" aria-live="polite">
            <span id="geometry-readout">Concave</span>
            <span id="texture-readout">Matte</span>
            <span id="resolution-readout">1x</span>
            <span id="surface-readout">Mesh</span>
            <span id="trial-readout">Trials 0</span>
          </div>
        </section>

        <aside class="control-panel" aria-label="Stimulus and trial controls">
          <section>
            <h2>Stimulus</h2>
            <label data-tooltip="Switches the rendered face between the hollow/concave stimulus and a convex control while keeping the same mesh identity.">
              Geometry
              <select id="geometry-condition">
                <option value="concave_face" selected>Concave face</option>
                <option value="convex_face">Convex face</option>
              </select>
            </label>
            <label data-tooltip="Scales the depth inversion along the face depth axis. This is logged as the per-trial concavity scale.">
              Concavity
              <input id="concavity-scale" type="range" min="0.2" max="1.2" value="1.2" step="0.01" />
              <output id="concavity-output">1.20</output>
            </label>
            <label data-tooltip="Chooses the face surface texture path: matte, procedural face cues, procedural noise, an F blend, or a local uploaded image.">
              Texture
              <select id="texture-mode">
                <option value="matte" selected>Matte</option>
                <option value="procedural_face">Procedural face</option>
                <option value="procedural_noise">Procedural noise</option>
                <option value="blend_f">Blend F</option>
                <option value="uploaded">Uploaded texture</option>
              </select>
            </label>
            <label
              id="texture-weight-control"
              data-tooltip="Controls the blend weight for the procedural texture continuum. F=0 favors noise; F=1 favors face-like texture cues."
              hidden
            >
              Texture F
              <input id="texture-weight-f" type="range" min="0" max="1" value="0" step="0.01" />
              <output id="texture-weight-output">0.00</output>
            </label>
            <label
              id="texture-drop-zone"
              class="file-drop"
              data-tooltip="Applies a local image to the face texture map. The image stays in the browser; exports store metadata, not image bytes."
              hidden
            >
              <span>Texture upload</span>
              <span class="file-drop-action">Drop image or choose file</span>
              <input id="texture-upload" type="file" accept="image/*" />
            </label>
            <p id="texture-upload-status" class="field-note" aria-live="polite" hidden>No uploaded texture</p>
            <label data-tooltip="Cuts feature-region apertures in the fragment shader without changing the mesh topology. Logged as feature_hole_mode.">
              Feature apertures
              <select id="feature-hole-mode">
                <option value="none">None</option>
                <option value="eyes">Eyes</option>
                <option value="eyes_mouth">Eyes + mouth</option>
                <option value="eyes_mouth_nose" selected>Eyes + mouth + nostrils</option>
              </select>
            </label>
            <label data-tooltip="Sets runtime mesh oversampling. Higher values preserve the same asset identity but increase render subdivision.">
              Mesh resolution
              <select id="mesh-resolution">
                <option value="native" selected>Native</option>
                <option value="subdivide_2">2x oversampled</option>
                <option value="subdivide_4">4x oversampled</option>
                <option value="subdivide_8">8x oversampled</option>
              </select>
            </label>
            <label data-tooltip="Renders the face either as a continuous surface or as triangle particles that keep their original UV correspondence.">
              Surface mode
              <select id="surface-render-mode">
                <option value="continuous_mesh" selected>Continuous mesh</option>
                <option value="triangle_particles">Triangle particles</option>
              </select>
            </label>
            <label
              id="triangle-separation-control"
              data-tooltip="Shrinks each triangle around its centroid in triangle-particle mode, opening gaps while preserving the triangle positions."
              hidden
            >
              Triangle separation
              <input id="triangle-separation" type="range" min="0" max="0.65" value="0" step="0.01" />
              <output id="triangle-separation-output">0.00</output>
            </label>
            <label data-tooltip="Adds flat-web rotation for inspection. Rotation is not required for trial recording and remains logged as a display parameter.">
              Rotation
              <input id="rotation-speed" type="range" min="0" max="0.7" value="0.18" step="0.01" />
              <output id="rotation-output">0.18</output>
            </label>
            <label
              class="check-row"
              data-tooltip="Shows the local rod/marker probe used to separate global face interpretation from local depth judgments."
            >
              <input id="show-probe" type="checkbox" />
              Probe marker
            </label>
            <label
              id="probe-depth-control"
              data-tooltip="Offsets the probe along the face depth axis so it can sit in front of, on, or behind the sampled face surface."
              hidden
            >
              Probe depth
              <input id="probe-depth" type="range" min="-0.04" max="0.04" value="-0.012" step="0.001" />
              <output id="probe-depth-output">-0.012 m</output>
            </label>
          </section>

          <section>
            <h2>Lighting</h2>
            <label data-tooltip="Applies a named lighting/material preset while keeping the underlying light and reflectance values editable and logged.">
              Preset
              <select id="lighting-preset">
                <option value="custom" selected>Custom</option>
                <option value="baseline_virtual">Baseline virtual</option>
                <option value="high_ambiguity">High ambiguity</option>
                <option value="concavity_revealing">Concavity revealing</option>
                <option value="realistic_material">Realistic rough material</option>
                <option value="low_cue_matte">Low-cue matte</option>
              </select>
            </label>
            <label data-tooltip="Sets the main directional light intensity. Higher values increase shape-from-shading cues.">
              Key intensity
              <input id="key-light-intensity" type="range" min="0" max="3.2" value="1.8" step="0.05" />
              <output id="key-light-intensity-output">1.80</output>
            </label>
            <label data-tooltip="Moves the main light horizontally around the face in degrees.">
              Key azimuth
              <input id="key-light-azimuth" type="range" min="-90" max="90" value="-20" step="1" />
              <output id="key-light-azimuth-output">-20°</output>
            </label>
            <label data-tooltip="Moves the main light above or below the face in degrees.">
              Key elevation
              <input id="key-light-elevation" type="range" min="-35" max="65" value="26" step="1" />
              <output id="key-light-elevation-output">26°</output>
            </label>
            <label data-tooltip="Sets fill light as a ratio of key-light intensity, preserving a logged relation between the two lights.">
              Fill ratio
              <input id="fill-light-ratio" type="range" min="0" max="1" value="0.32" step="0.01" />
              <output id="fill-light-ratio-output">0.32</output>
            </label>
            <label data-tooltip="Controls hemisphere ambient intensity, which changes low-frequency illumination and cue ambiguity.">
              Ambient
              <input id="ambient-light-intensity" type="range" min="0" max="3.4" value="2.4" step="0.05" />
              <output id="ambient-light-intensity-output">2.40</output>
            </label>
            <label data-tooltip="Interpolates the mask material from rough matte toward clearer specular/clearcoat reflection.">
              Reflectance
              <input id="mask-reflectance" type="range" min="0" max="1" value="0" step="0.01" />
              <output id="mask-reflectance-output">0.00</output>
            </label>
          </section>

          <section>
            <h2>Runtime</h2>
            <button id="enter-xr" type="button" disabled data-tooltip="Requests an immersive WebXR session only when the browser reports support.">
              Enter VR
            </button>
            <button id="reset-view" type="button" data-tooltip="Returns the camera and face rotation to the default inspection view.">Reset View</button>
          </section>

          <section>
            <h2>Response</h2>
            <div
              class="button-row"
              role="group"
              aria-label="Global shape response"
              data-tooltip="Records the global face-shape judgment separately from the local probe-depth response."
            >
              <button type="button" data-global-response="convex">Convex</button>
              <button type="button" data-global-response="concave">Concave</button>
              <button type="button" data-global-response="uncertain">Uncertain</button>
            </div>
            <div
              class="button-row"
              role="group"
              aria-label="Local probe response"
              data-tooltip="Records the local probe-depth judgment separately from the global face-shape response."
            >
              <button type="button" data-local-response="near">Near</button>
              <button type="button" data-local-response="far">Far</button>
              <button type="button" data-local-response="same_depth">Same</button>
            </div>
            <label data-tooltip="Records confidence for the current response on a five-point scale.">
              Confidence
              <input id="confidence" type="range" min="1" max="5" value="3" step="1" />
              <output id="confidence-output">3</output>
            </label>
            <button id="record-trial" type="button" data-tooltip="Appends the current stimulus, probe, response, runtime, and quality state as a trial.">
              Record Trial
            </button>
            <button id="download-session" type="button" data-tooltip="Downloads the session package with JSONL, CSV, quality log, and asset manifest data.">
              Download Session
            </button>
          </section>
        </aside>
      </main>
    </div>
    <div id="tooltip-layer" class="tooltip-layer" role="tooltip" hidden></div>
  </body>
